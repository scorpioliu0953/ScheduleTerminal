name: ScheduleTerminal
options:
  bundleIdPrefix: com.scheduleterm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"

targets:
  ScheduleTerminal:
    type: application
    platform: macOS
    sources:
      - path: ScheduleTerminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scheduleterm.ScheduleTerminal
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: ScheduleTerminal/Info.plist
        CODE_SIGN_ENTITLEMENTS: ScheduleTerminal/ScheduleTerminal.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
