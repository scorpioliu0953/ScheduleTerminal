name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ScheduleTerminal.xcodeproj \
            -scheme ScheduleTerminal

      - name: Build Release
        run: |
          xcodebuild -project ScheduleTerminal.xcodeproj \
            -scheme ScheduleTerminal \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/ScheduleTerminal.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Schedule Terminal" -srcfolder dmg_staging -ov -format UDZO ScheduleTerminal.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleTerminal-DMG
          path: ScheduleTerminal.dmg

      - name: Update README timestamp
        if: github.ref == 'refs/heads/main'
        run: |
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          sed -i '' "s|^\*Last built:.*$|*Last built: ${BUILD_DATE}*|" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "docs: update build timestamp [skip ci]" && git push)

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ScheduleTerminal.dmg
          generate_release_notes: true
